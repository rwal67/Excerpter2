<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Excerpter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ede6d6;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    /* Phone frame */
    #frame {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    /* Header */
    #feed-header {
      flex-shrink: 0;
      height: 44px;
      background: #ede6d6;
      border-bottom: 1px solid #000;
      display: flex;
      align-items: stretch;
    }
    #feed-header a {
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #000;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    #feed-header a:hover { opacity: 0.45; }
    #header-title { flex: 1; }
    #pause-btn {
      background: none;
      border: none;
      border-left: 1px solid #000;
      border-right: 1px solid #000;
      padding: 0 18px;
      cursor: pointer;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      transition: opacity 0.15s;
    }
    #pause-btn:hover { opacity: 0.45; }

    /* Feed */
    #feed {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    #feed::-webkit-scrollbar { display: none; }

    /* Reel */
    .reel {
      position: relative;
      height: calc(100vh - 44px);
      width: 100%;
      scroll-snap-align: start;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    .reel-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Scanline overlay — applied when reel has data-scanlines */
    .reel.scanlines::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Bottom gradient for subtitle legibility */
    .reel-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 40%);
      pointer-events: none;
      z-index: 2;
    }

    /* Subtitles */
    .reel-subtitles {
      position: absolute;
      bottom: 52px;
      left: 20px;
      right: 20px;
      text-align: center;
      z-index: 3;
      pointer-events: none;
      line-height: 1.4;
    }

    .sub-word {
      display: inline-block;
      margin: 0 3px 4px;
      font-size: 19px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,1), 0 0 2px rgba(0,0,0,1);
      opacity: 0;
      transform: translateY(5px) scale(0.94);
      transition: opacity 0.07s ease, transform 0.07s ease;
    }
    .sub-word.active {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .sub-word.spoken {
      opacity: 0.55;
      transform: translateY(0) scale(1);
      color: #ddd;
    }
    .sub-word.highlight {
      color: #ffe44d;
      opacity: 1;
    }
  </style>
</head>
<body>
<div id="frame">
    <header id="feed-header">
      <a id="header-title" href="index.html">Excerpter</a>
      <button id="pause-btn" aria-label="Pause">
        <svg id="icon-pause" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
        <svg id="icon-play" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="display:none"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <a id="header-about" href="about.html">About</a>
    </header>
  <div id="feed"></div>
</div>

<script>
// ==========================================
// CORPUS
// ==========================================

    "what strange people and places tie us to the rock",
    "the idea doesn't need you",
    "'i am the martini with an olive i am the east coast i am legion'",
    "everybody is wearing orange bronzer and i am having a terrible time",
    "'come on in the water's fine' he said gesturing to the tar pit",
    "nothing is as sweet as a yesterday",
    "nobody remembers their first thought and all are surely the better for this",
    "she could have sworn her whole body followed suit and calcified becoming like salt",
    "a displaced wrath wears at the heart but a focused one feeds it",
    "the city stashed the two among its folds",
    "creation was messy work and to be created was thankless",
    "this is the kind of lesson which you do not read or absorb but absorbs you",
  ],
  IMAGE: [
    "the neon theotokos","keeled like felled game in the thicket",
    "take in the hunch and uneven gait","tufted like seafoam",
    "faces painted with a smudged brush","like flames being passed from candle to candle",
    "rubbing elbows with elbow patches","dampened god-fearing clouds hung low",
    "oh then looking into the brown eyes of the man in the blue tracksuit",
    "and he stowed away in the greater right breast pocket",
    "she hid herself among the lilies","all food was just a miserably dull compote",
    "in his hands is a parcel growing hot to the touch","om mani padme hum",
    "crouched against a dull expanse","long loved by dragged toes in steel-toed boots",
    "the crust of posters the mantle condemnation notices the lead paint inner core",
    "and the green alligator on bates the one with the scaly paint",
    "the kids were playing house one held up a paper mortache",
    "and all those things that run away from a flashlight",
    "california pennsylvania","jersey shore pennsylvania",
    "all lost along the little foothill we've climbed",
    "something about a gas station thc experiment",
    "a wiry tall young man all hollowed and caved-in",
    "they dug with their soft hands until they were like sheetrock",
    "grown skeletal in proud hunger","little joyful ghosts dancing across the ceiling",
    "sorry little constellations","sunken eyes that gleamed like cracked robin eggs",
    "may someday haunt these rented tombs",
    "a heat like burning static started somewhere behind her ears",
    "dear alice","there's a broken window fixed with sharp cobwebs",
    "grace flowing downstream","those pews were like ice",
    "made like honey in the waning light","an inklike curtain",
  ],
  STATEMENT: [
    "rain had no name in those parts","only thing past that way is a more perfect dark",
    "every door down the street slammed","the little red parrot said something i cannot say",
    "it was a quick night all things considered",
    "and main street was a well-worked oddly beating heart at this point",
    "oscar sang this about all this and more to himself",
    "sandra has been rolling her own cigarettes lately",
    "it felt like this conversation lasted for days",
    "only one more is needed to relight the others","the river was the sink",
    "there i climbed a ladder that fell","life uncertain and all the better for that",
    "and when the sun came up she would pretend to be no more than compost",
    "and the world will kick them and they will be even muddier yet",
    "i put it down years ago only when i'm drinking these days",
    "and that he got up unscathed and had put a dent in the bus",
    "so i walked round and round a room-shaped circle",
    "they had a word for this business when zoroaster was in charge",
    "i remember little of last night but my brain is trying that's why it hurts so much",
    "what a creature i was","oh we danced and danced and danced and danced and",
    "'fetch my tracksuit' he said it's a formal event",
    "'i wanna be a coal miner when i grow up'",
    "words finally broke","rowed buildings began to loom and supplant the trees",
    "and and and and and","she dreams of the coast",
    "no matter the shape no matter how strange",
  ],
  ASIDE: [
    "such is the way of things","they add character","it's all a terrible business",
    "awful really","so it goes","nothing nothing in particular",
    "beg your pardon","beautiful out isn't it","is that so",
    "the point still stands","and maybe it did",
    "idk lol hegel said something about that",
    "no not that new york the other new york","that's showbiz baby",
    "thats life in the big city","not even myself","my condolences",
    "what an animal am i","toting such fun company","having strange conversations",
    "a little less yours","much less mine","i don't know","shut up",
    "a great indistinct revulsion","wherever that may be","right this way",
  ],
  QUESTION: [
    "what friends","would a cartoon tiger make it clearer",
    "does that water know its station does it do it well",
    "did that song really change your life though","anyway how was your holiday",
    "where can you buy a yesterday",
    "how does an idea come does a deer shit in the woods",
    "can it be though","should it be","why i came out here","and i knew one of us",
  ],
};

// ==========================================
// VISUAL FILTER PRESETS
// ==========================================
const FILTER_PRESETS = [
  { filter: 'none',                                              scanlines: false },
  { filter: 'none',                                              scanlines: false },
  { filter: 'grayscale(1)',                                      scanlines: false },
  { filter: 'grayscale(1) contrast(1.3)',                        scanlines: true  },
  { filter: 'grayscale(1) brightness(1.4) contrast(1.6)',        scanlines: false },
  { filter: 'sepia(0.8) contrast(1.15)',                         scanlines: false },
  { filter: 'sepia(1) hue-rotate(200deg)',                       scanlines: false },
  { filter: 'hue-rotate(180deg) saturate(1.5)',                  scanlines: false },
  { filter: 'hue-rotate(90deg) saturate(1.8) contrast(1.1)',     scanlines: false },
  { filter: 'invert(0.88) hue-rotate(180deg)',                   scanlines: false },
  { filter: 'contrast(2.2) brightness(0.75) saturate(0.2)',      scanlines: true  },
  { filter: 'saturate(3.5) contrast(1.05)',                      scanlines: false },
  { filter: 'brightness(0.55) contrast(1.6)',                    scanlines: true  },
  { filter: 'grayscale(1) invert(1) contrast(1.2)',              scanlines: false },
  { filter: 'hue-rotate(270deg) saturate(2) brightness(0.9)',    scanlines: false },
];

// ==========================================
// SCRIPT GENERATOR
// ==========================================
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generateScript(){
  const beats = [
    pick(CORPUS.IMAGE),
    pick(CORPUS.STATEMENT),
    pick([...CORPUS.ANCHOR, ...CORPUS.STATEMENT]),
    pick(CORPUS.ASIDE),
  ];
  if(Math.random() < 0.35) beats.splice(2, 0, pick(CORPUS.QUESTION));
  return beats.join('. ') + '.';
}

// ==========================================
// VIDEO POOL
// ==========================================
let lastVid = -1;
function randomVideo(){
  let n;
  do { n = Math.floor(Math.random()*16)+1; } while(n === lastVid);
  lastVid = n;
  return `ExcerpterVid${n}.mp4`;
}

// ==========================================
// BUILD REEL
// ==========================================
function buildReel(){
  const script  = generateScript();
  const words   = script.split(/\s+/).filter(Boolean);
  const vidSrc  = randomVideo();
  const preset  = FILTER_PRESETS[Math.floor(Math.random()*FILTER_PRESETS.length)];

  const reel = document.createElement('div');
  reel.className = 'reel' + (preset.scanlines ? ' scanlines' : '');

  const video = document.createElement('video');
  video.className = 'reel-video';
  video.src = vidSrc;
  video.loop = true;
  video.muted = true;
  video.playsInline = true;
  video.preload = 'auto';
  video.style.filter = preset.filter;
  reel.appendChild(video);

  const gradient = document.createElement('div');
  gradient.className = 'reel-gradient';
  reel.appendChild(gradient);

  const subDiv = document.createElement('div');
  subDiv.className = 'reel-subtitles';
  words.forEach((w, i) => {
    const span = document.createElement('span');
    span.className = 'sub-word';
    span.textContent = w;
    span.dataset.idx = i;
    subDiv.appendChild(span);
    subDiv.appendChild(document.createTextNode(' '));
  });
  reel.appendChild(subDiv);

  return { reel, video, script, words, subDiv, voice: assignVoice(), advTimer: null };
}

// ==========================================
// TTS + SUBTITLE SYNC
// ==========================================
let engVoices = [];

function initVoices(){
  const all = window.speechSynthesis.getVoices();
  // Prefer installed English voices — filter out non-English
  engVoices = all.filter(v => v.lang.startsWith('en'));
  if(!engVoices.length) engVoices = all;
}
if(window.speechSynthesis){
  initVoices();
  window.speechSynthesis.onvoiceschanged = initVoices;
}

// Assign a random English voice to each reel when it's built
function assignVoice(){
  if(!engVoices.length) return null;
  return engVoices[Math.floor(Math.random() * engVoices.length)];
}

// Chrome bug: speechSynthesis silently stops after ~15s
// Keep it alive with a periodic pause/resume
let chromeFix = null;
function startChromeFix(){
  clearInterval(chromeFix);
  chromeFix = setInterval(() => {
    if(window.speechSynthesis && window.speechSynthesis.speaking){
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
  }, 12000);
}

// Timer-based word advancement — more reliable than onboundary
// ~420ms per word at rate 0.9 (~2.4 words/sec)
const MS_PER_WORD = 420;

function startTTS(data){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const subWords = data.subDiv.querySelectorAll('.sub-word');
  subWords.forEach(el => el.className = 'sub-word');

  const utter  = new SpeechSynthesisUtterance(data.script);
  utter.rate   = 0.9;
  utter.pitch  = 1.0;
  utter.volume = 1;
  if(data.voice) utter.voice = data.voice;

  let subIdx      = 0;
  let subInterval = null;

  function advanceWord(){
    // Mark previous spoken
    if(subIdx > 0 && subWords[subIdx - 1]){
      subWords[subIdx - 1].classList.remove('highlight', 'active');
      subWords[subIdx - 1].classList.add('spoken');
    }
    if(subIdx < subWords.length){
      subWords[subIdx].classList.add('active', 'highlight');
      subIdx++;
    } else {
      clearInterval(subInterval);
    }
  }

  utter.onstart = () => {
    startChromeFix();
    subIdx = 0;
    subInterval = setInterval(advanceWord, MS_PER_WORD);
  };

  utter.onend = () => {
    clearInterval(subInterval);
    subWords.forEach(el => { el.classList.remove('highlight','active'); el.classList.add('spoken'); });
    data.advTimer = setTimeout(scrollToNext, 1600);
  };

  utter.onerror = () => {
    clearInterval(subInterval);
    data.advTimer = setTimeout(scrollToNext, 9000);
  };

  window.speechSynthesis.speak(utter);
}

function stopTTS(data){
  clearTimeout(data.advTimer);
  clearInterval(chromeFix);
  window.speechSynthesis.cancel();
}

// ==========================================
// BACKGROUND MUSIC
// ==========================================
const TRACKS     = Array.from({length:7}, (_,i) => `ExcerpterMusic${i+1}.mp3`);
let   lastTrack  = -1;
const bgAudio    = new Audio();
bgAudio.loop     = true;
bgAudio.volume   = 0.15;

function randomTrack(){
  let n;
  do { n = Math.floor(Math.random() * TRACKS.length); } while(n === lastTrack);
  lastTrack = n;
  return TRACKS[n];
}

function startMusic(){
  if(bgAudio.paused){
    bgAudio.src = randomTrack();
    bgAudio.play().catch(()=>{});
  }
}

function changeTrack(){
  const next = randomTrack();
  // Fade out, swap, fade in
  const fade = setInterval(() => {
    if(bgAudio.volume > 0.01){
      bgAudio.volume = Math.max(0, bgAudio.volume - 0.025);
    } else {
      clearInterval(fade);
      bgAudio.src = next;
      bgAudio.play().catch(()=>{});
      const fadeIn = setInterval(() => {
        if(bgAudio.volume < 0.15){
          bgAudio.volume = Math.min(0.15, bgAudio.volume + 0.015);
        } else {
          clearInterval(fadeIn);
        }
      }, 40);
    }
  }, 40);
}
const feed      = document.getElementById('feed');
const reelData  = [];
let   activeIdx = -1;
let   isPaused  = false;

const pauseBtn  = document.getElementById('pause-btn');
const iconPause = document.getElementById('icon-pause');
const iconPlay  = document.getElementById('icon-play');

function setPaused(val){
  isPaused = val;
  iconPause.style.display = isPaused ? 'none'  : 'block';
  iconPlay.style.display  = isPaused ? 'block' : 'none';
  if(activeIdx < 0) return;
  const data = reelData[activeIdx];
  if(isPaused){
    data.video.pause();
    bgAudio.pause();
    window.speechSynthesis.pause();
    clearTimeout(data.advTimer);
  } else {
    data.video.play().catch(()=>{});
    bgAudio.play().catch(()=>{});
    window.speechSynthesis.resume();
  }
}

pauseBtn.addEventListener('click', e => {
  e.stopPropagation();
  setPaused(!isPaused);
});

const sentinel = document.createElement('div');
sentinel.style.cssText = 'height:1px;pointer-events:none;flex-shrink:0;';
feed.appendChild(sentinel);

function addReel(){
  const data = buildReel();
  reelData.push(data);
  feed.insertBefore(data.reel, sentinel);
  reelObserver.observe(data.reel);
}

function scrollToNext(){
  feed.scrollBy({ top: feed.clientHeight, behavior: 'smooth' });
}

function activate(idx){
  if(idx === activeIdx) return;
  if(activeIdx >= 0){
    const prev = reelData[activeIdx];
    prev.video.pause();
    stopTTS(prev);
  }
  activeIdx = idx;
  const data = reelData[idx];
  data.video.currentTime = 0;
  data.video.play().catch(()=>{});
  startMusic();
  // Change track every 3 reels
  if(idx > 0 && idx % 3 === 0) changeTrack();
  startTTS(data);
}

const reelObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.intersectionRatio >= 0.75){
      const idx = reelData.findIndex(d => d.reel === entry.target);
      if(idx >= 0) activate(idx);
    }
  });
}, { threshold: [0.75] });

const sentinelObserver = new IntersectionObserver(entries => {
  if(entries[0].isIntersecting){ addReel(); addReel(); }
}, { threshold: 0 });
sentinelObserver.observe(sentinel);

feed.addEventListener('click', () => {
  if(isPaused) return;
  if(activeIdx < 0) return;
  stopTTS(reelData[activeIdx]);
  scrollToNext();
});

addReel(); addReel(); addReel();
</script>
</body>
</html>
