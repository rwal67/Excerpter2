      font-weight: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;

    #header-title {
      flex: 0 0 25%;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: #ede6d6;
      border: none;
      border-right: 1px solid #000;
      text-decoration: none;
      transition: background 0.15s;
    }
    #header-title:hover { background: #ddd5c4; }
    #header-title h1 { color: #000; }

    #header-generate {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      cursor: pointer;
      border: none;
      color: #ede6d6;
      transition: background 0.15s;
    }
    #header-generate:hover { background: #222; }
    #header-generate.ended { background: #ede6d6; color: #000; }
    #header-generate.ended:hover { background: #ddd5c4; }

    #header-counter {
      flex: 0 0 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ede6d6;
      border: none;
      border-left: 1px solid #000;
    }
    #counter-num { color: #000; font-size: 1.1rem; }

    #header-about {
      flex: 0 0 25%;
      display: flex;
      align-items: stretch;
      border-left: 1px solid #000;
      background: #000;
    }
    #header-about a {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 24px;
      width: 100%;
      height: 100%;
      color: #ede6d6;
      text-decoration: none;
    }
    #header-about a:hover { background: #222; }

    #diptych {
      display: flex;
      flex-direction: row-reverse;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    #video-panel {
      flex: 0 0 40%;
      position: relative;
      background: #ede6d6;
      overflow: hidden;
    }

    #video-panel > video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #video-panel > video.active { display: block; }

    #distortion-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .distortion { position: absolute; }

    #text-panel {
      flex: 0 0 60%;
      overflow-y: auto;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
    }

    #idle-cycler {
      position: absolute;
      top: 0; left: 630px; right: 80px; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #idle-cycler span {
      font-size: 15px;
      font-weight: 300;
      color: #000;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      max-width: 88%;
      text-overflow: ellipsis;
    }

    #output { display: flex; flex-direction: column; }

    .line {
      display: block;
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      color: #000;
      letter-spacing: 0.01em;
      padding: 0.1em 0;
    }
    .line.size-sm  { font-size: 15px;  line-height: 1.35; }
    .line.size-md  { font-size: 20px;  line-height: 1.15; }
    .line.size-lg  { font-size: 28px;  line-height: 1.05; }
    .line.size-xl  { font-size: 40px;  line-height: 0.95; letter-spacing: -0.01em; }

    .line.indent-1 { padding-left: 3em; }
    .line.indent-2 { padding-left: 7em; }
    .line.indent-3 { padding-left: 12em; }
    .line.gap-before { margin-top: 0.6em; }

    @media (max-width: 700px) {
      body { overflow: auto; height: auto; }
      #diptych { flex-direction: column; }
      #video-panel { flex: none; height: 40vw; }
      #text-panel { padding: 24px 20px; }
      #header-about { flex: 0 0 20%; }
      .line.indent-2 { padding-left: 3em; }
      .line.indent-3 { padding-left: 5em; }
      .line.size-xl  { font-size: 26px; }
    }
  </style>

      el.style.borderRadius = '50%';
    } else if (shape === 2) {
      const side = Math.random() < 0.5 ? 'left' : 'right';
      el.style[side] = '0'; el.style.top = '0';
      el.style.width = '50%'; el.style.height = '100%';
    } else if (shape === 3) {
      const side = Math.random() < 0.5 ? 'top' : 'bottom';
      el.style.left = '0'; el.style[side] = '0';
      el.style.width = '100%'; el.style.height = '50%';
    } else {
      const h = rand(12, 30);
      el.style.left = '0'; el.style.top = `${rand(5,100-h)}%`;
      el.style.width = '100%'; el.style.height = `${h}%`;
    }
    return el;
  }

  // ── Text overlay — random color, optional highlight box ──
  const overlayColors = [
    '#fff', '#000', '#ff5032', '#ffd800', '#00b4ff',
    '#b400ff', '#00ff78', '#ff9500', '#ff3cac', '#00e5cc',
  ];

  function pickOverlayColor(exclude) {
    const pool = overlayColors.filter(c => c !== exclude);
    return pool[randInt(0, pool.length)];
  }

  function makeTextOverlay() {
    const el = document.createElement('div');
    el.style.left          = `${rand(4, 50)}%`;
    el.style.top           = `${rand(5, 78)}%`;
    el.style.maxWidth      = '48%';
    el.style.fontFamily    = "'IBM Plex Sans', sans-serif";
    el.style.fontSize      = `${randInt(16, 34)}px`;
    el.style.lineHeight    = '1.2';
    el.style.pointerEvents = 'none';

    const textColor = overlayColors[randInt(0, overlayColors.length)];
    el.style.color = textColor;

    if (Math.random() < 0.5) {
      // highlighted box — bg is always a different color from the text
      el.style.backgroundColor = pickOverlayColor(textColor);
      el.style.padding         = '2px 6px';
    } else {
      // plain text with drop shadow
      el.style.textShadow = '0 1px 4px rgba(0,0,0,0.8)';
    }

    el.textContent = randExcerpt();
    return el;
  }

  // ── Distortion types (equal weight) ──
  const distortionTypes = [
    () => { const e=document.createElement('div'); e.style.cssText=`left:0;width:100%;top:${rand(5,95)}%;height:${randInt(1,6)}px;background:${solidColor()};`; return e; },
    () => { const e=document.createElement('div'); e.style.cssText=`top:0;height:100%;left:${rand(5,95)}%;width:${randInt(1,5)}px;background:${solidColor()};`; return e; },
    () => { const e=document.createElement('div'); const w=rand(8,45),h=rand(8,40); e.style.cssText=`left:${rand(0,100-w)}%;top:${rand(0,100-h)}%;width:${w}%;height:${h}%;background:${solidColor()};`; return e; },
    () => { const e=document.createElement('div'); const c=['top:0;left:0;','top:0;right:0;','bottom:0;left:0;','bottom:0;right:0;'],s=rand(10,35); e.style.cssText=`${c[randInt(0,4)]}width:${s}%;height:${s}%;background:${solidColor()};`; return e; },
    () => makeTextOverlay(),
    () => { const e=document.createElement('div'); e.style.cssText=`left:0;width:100%;top:${rand(10,80)}%;height:${rand(3,15)}%;background:${solidColor()};`; return e; },
    () => { const e=document.createElement('div'); const s=rand(4,25); e.style.cssText=`left:${rand(5,90)}%;top:${rand(5,90)}%;width:${s}%;height:${s}%;border-radius:50%;background:${solidColor()};`; return e; },
    () => { const e=document.createElement('div'); const w=rand(10,50),h=rand(10,40); e.style.cssText=`left:${rand(0,100-w)}%;top:${rand(0,100-h)}%;width:${w}%;height:${h}%;border:${randInt(1,4)}px solid ${solidColor()};background:transparent;`; return e; },
    () => makeVideoOverlay(),
  ];

  function addDistortion() {
    if (distLayer.children.length >= DISTORTION_CAP) distLayer.removeChild(distLayer.firstChild);
    const el = distortionTypes[randInt(0, distortionTypes.length)]();
    el.classList.add('distortion');
    distLayer.appendChild(el);
    if (el.tagName === 'VIDEO') { el.load(); el.play().catch(() => {}); }
  }

  function getRandomVideo() {
    let avail = videos.filter(v => !usedVideos.includes(v));
    if (!avail.length) { usedVideos = []; avail = [...videos]; }
    const pick = avail[randInt(0, avail.length)];
    usedVideos.push(pick);
    return pick;
  }

  function swapVideo() {
    const next = getRandomVideo();
    if (activeSlot === 'A') {
      vidA.pause();
      vidB.src = next; vidB.load(); vidB.play();
      vidA.classList.remove('active'); vidB.classList.add('active');
      activeSlot = 'B';
    } else {
      vidB.pause();
      vidA.src = next; vidA.load(); vidA.play();
      vidB.classList.remove('active'); vidA.classList.add('active');
      activeSlot = 'A';
    }
  }

  function doVideoAction() {
    if (!videoSwapped) {
      swapVideo();
      distLayer.innerHTML = '';
      videoSwapped = true;
      return;
    }
    if (Math.random() < 0.35) addDistortion();
  }

  // ── Text helpers ──
  const punctMarks = ['?','!','.',',',';','...',':'];

  function injectPunct(text) {
    if (Math.random() > 0.20) return text;
    const mark = punctMarks[randInt(0, punctMarks.length)];
    if (Math.random() < 0.55) return text.replace(/[.,;:!?…]+$/, '') + mark;
    const words = text.split(' ');
    if (words.length < 3) return text + mark;
    const pos = randInt(1, words.length - 1);
    if (/[.,;:!?]$/.test(words[pos])) return text;
    words[pos] += mark;
    return words.join(' ');
  }

  function cleanPunct(text) {
    return text.replace(/,\s*—/g, ',').replace(/\s*—\s*/g, ' ');
  }

  function styleText(text) {
    const short = text.length < 42;
    const r = Math.random();
    let html = text, extraStyle = '';
    if (r < 0.18) {
      html = `<i>${text}</i>`;
    } else if (r < 0.27) {
      extraStyle = 'font-weight:300;';
    } else if (short && r < 0.33) {
      html = text.toUpperCase();
      extraStyle = 'letter-spacing:0.1em;';
    } else {
      const ws = text.split(' ');
      const candidates = ws.map((w,i) => w.replace(/[^a-zA-Z]/g,'').length > 4 ? i : -1).filter(i => i >= 0);
      if (candidates.length && Math.random() < 0.2) {
        const wi = candidates[randInt(0, candidates.length)];
        ws[wi] = Math.random() < 0.5 ? `<b>${ws[wi]}</b>` : `<i>${ws[wi]}</i>`;
      }
      html = ws.join(' ');
    }
    return { html, extraStyle };
  }

  function makeLine(text, size, indent, gapBefore) {
    const { html, extraStyle } = styleText(injectPunct(cleanPunct(text)));
    const el = document.createElement('span');
    el.classList.add('line', size);
    if (indent)     el.classList.add(indent);
    if (gapBefore)  el.classList.add('gap-before');
    if (extraStyle) el.style.cssText = extraStyle;
    el.innerHTML = html;
    return el;
  }

  // ── Cycle logic ──
  function endCycle() {
    cycleEnded = true;
    generateLabel.textContent = 'Restart';
    generateBtn.classList.add('ended');
    counterNum.textContent = '0';
  }

  function triggerGenerate() {
    if (cycleEnded) { triggerRestart(); return; }

    stopIdle();

    clickSound.currentTime = 0;
    clickSound.play();

    if (remaining <= 0 || availableExcerpts.length === 0) { endCycle(); return; }

    const panel = document.getElementById('text-panel');
    if (outputDiv.scrollHeight >= panel.clientHeight - 40) { endCycle(); return; }

    remaining--;
    updateCounter();
    doVideoAction();

    const idx     = randInt(0, availableExcerpts.length);
    const primary = availableExcerpts.splice(idx, 1)[0];
    const isShort = primary.length < 38;
    const doCluster = isShort && Math.random() < 0.28 && availableExcerpts.length > 1;

    if (doCluster) {
      const shortPool = availableExcerpts.map((t,i) => ({t,i})).filter(({t}) => t.length < 38);
      const extra = Math.min(Math.random() < 0.5 ? 1 : 2, shortPool.length);
      const clusterTexts = [primary];
      for (let i = 0; i < extra; i++) {
        const pick = shortPool.splice(randInt(0, shortPool.length), 1)[0];
        clusterTexts.push(pick.t);
        const mi = availableExcerpts.indexOf(pick.t);
        if (mi >= 0) availableExcerpts.splice(mi, 1);
      }
      const clusterSizePool = ['size-sm','size-sm','size-md','size-md','size-md','size-lg'];
      const size   = clusterSizePool[randInt(0, clusterSizePool.length)];
      const indent = pickIndent(size);
      const gap    = Math.random() < 0.25;
      clusterTexts.forEach((t,i) => outputDiv.appendChild(makeLine(t, size, indent, i === 0 ? gap : false)));
    } else {
      const size   = pickSize(primary);
      const indent = pickIndent(size);
      const gap    = Math.random() < 0.22;
      outputDiv.appendChild(makeLine(primary, size, indent, gap));
    }

    if (remaining <= 0) endCycle();
  }

  function triggerRestart() {
    resetSound.currentTime = 0;
    resetSound.play();
    cycleEnded        = false;
    availableExcerpts = [...excerpts];
    usedVideos        = [];
    videoSwapped      = false;
    remaining         = Math.floor(Math.random() * 5) + 8;
    outputDiv.innerHTML = '';
    distLayer.innerHTML = '';
    vidA.classList.remove('active'); vidA.pause(); vidA.removeAttribute('src');
    vidB.classList.remove('active'); vidB.pause(); vidB.removeAttribute('src');
    activeSlot = 'A';
    generateLabel.textContent = 'Generate';
    generateBtn.classList.remove('ended');
    updateCounter();
    startIdle();
  }

  // ── Init ──
  generateBtn.addEventListener('click', triggerGenerate);
  updateCounter();
  startIdle();
</script>
</body>
</html>
