<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excerpter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #ede6d6;
  min-height: 100vh;
  font-family: 'IBM Plex Sans', sans-serif;
  overflow-x: hidden;
}

#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  background: #ede6d6;
  border-bottom: 1px solid #111;
  display: flex;
  align-items: stretch;
  z-index: 100;
}
#header a {
  display: flex; align-items: center; padding: 0 24px;
  font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: #111; text-decoration: none; transition: opacity 0.15s;
}
#header a:hover { opacity: 0.4; }
#header-title { flex: 1; }

#canvas {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  padding-top: 44px;
  overflow: hidden;
}

#svg-overlay {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}

#col {
  position: absolute;
  left: 52px;
  top: 72px;
  z-index: 2;
}

.node {
  display: flex;
  align-items: center;
  gap: 20px;
  cursor: pointer;
  user-select: none;
  outline: none;
  height: 44px;
}

.node-circle {
  width: 17px; height: 17px;
  border-radius: 50%;
  border: 1.5px solid #111;
  flex-shrink: 0;
  position: relative;
  transition: background 0.08s;
}
.node-circle::after {
  content: '';
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #111;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  transition: background 0.08s;
}
.node:hover .node-circle,
.node.kb-active .node-circle { background: #111; }
.node:hover .node-circle::after,
.node.kb-active .node-circle::after { background: #ede6d6; }

.node-label {
  font-size: 12px;
  font-weight: 300;
  color: #111;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 58vw;
  letter-spacing: 0.01em;
}

.locked-line {
  position: absolute;
  color: #111;
  line-height: 1.45;
  max-width: 60vw;
  pointer-events: none;
  z-index: 2;
}

.placed-img {
  position: absolute;
  transform-origin: top left;
  z-index: 1;
  pointer-events: none;
}

#reset-btn {
  position: fixed;
  bottom: 36px;
  left: 52px;
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 1.5px solid #111;
  background: transparent;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#reset-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #111;
  flex-shrink: 0;
  transition: width 0.28s ease, height 0.28s ease;
  pointer-events: none;
}
#reset-btn.full::after {
  content: '';
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #ede6d6;
  pointer-events: none;
}
#reset-btn:hover { opacity: 0.6; }
</style>
</head>
<body>

<header id="header">
  <a id="header-title" href="index.html">Excerpter</a>
  <a href="about.html">About</a>
</header>

<div id="canvas">
  <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="col"></div>
</div>

<div id="reset-btn"><div id="reset-dot"></div></div>

<script>
// ─────────────────────────────────────────
// CORPUS
// ─────────────────────────────────────────
const CORPUS = {

  IMAGE: [

    "sorry little constellations", "sunken eyes that gleamed like cracked robin eggs",

  ],

    "it felt like this conversation lasted for days",
    "only one more is needed to relight the others",
    "the river was the sink",
    "there i climbed a ladder that fell",
    "life uncertain and all the better for that",
    "and the world will kick them and they will be even muddier yet",
    "so i walked round and round a room-shaped circle",
    "what a creature i was",
    "oh we danced and danced and danced and danced and",
    "words finally broke", "she dreams of the coast",

  ],
  ASIDE: [

    "beg your pardon", "beautiful out isn't it", "is that so",

    "idk lol hegel said something about that",
    "that's showbiz baby", "thats life in the big city", "not even myself",
    "what an animal am i", "i don't know", "shut up",
    "a little less yours", "much less mine",
  ],
  QUESTION: [
    "what friends", "would a cartoon tiger make it clearer",
    "did that song really change your life though", "anyway how was your holiday",
    "where can you buy a yesterday",
    "how does an idea come does a deer shit in the woods",
    "can it be though", "should it be",
  ],
};

const ALL_LINES = [
  ...CORPUS.ANCHOR, ...CORPUS.IMAGE,
  ...CORPUS.STATEMENT, ...CORPUS.ASIDE, ...CORPUS.QUESTION
];

// ─────────────────────────────────────────
// SVG REGISTRY
// ─────────────────────────────────────────
const REGISTRY = [
  { id: 'Lo_go', file: 'Lo_go.svg', w: 264, h: 246,
    root: { nx: 0.477, ny: 0.99 },
    sockets: [
      { nx: 0.212, ny: 0.852, dir: 'down' },
      { nx: 0.864, ny: 0.97,  dir: 'down' }
    ]
  },
  { id: 'helmet', file: 'helmet.svg', w: 100, h: 77,
    root: { nx: 0.21, ny: 0.883 },
    sockets: [
      { nx: 0.09, ny: 0.974, dir: 'down'  },
      { nx: 0.71, ny: 0.961, dir: 'down'  },
      { nx: 0.92, ny: 0.831, dir: 'right' }
    ]
  },
  { id: 'GUYGUY2', file: 'GUYGUY2.svg', w: 240, h: 186,
    root: { nx: 0.887, ny: 0.094 },
    sockets: [
      { nx: 0.992, ny: 0.234, dir: 'right' },
      { nx: 0.733, ny: 0.008, dir: 'up'    },
      { nx: 0.729, ny: 0.997, dir: 'down'  }
    ]
  },
  { id: 'Haus', file: 'Haus.svg', w: 85, h: 133,
    root: { nx: 0, ny: 0.603 },
    sockets: [
      { nx: 0.012, ny: 0.491, dir: 'left' },
      { nx: 0,     ny: 0.062, dir: 'left' },
      { nx: 0.165, ny: -0.006, dir: 'up'  }
    ]
  },
  { id: 'pianoguy', file: 'pianoguy.svg', w: 138, h: 89,
    root: { nx: 0.004, ny: 0.475 },
    sockets: [
      { nx: -0.004, ny: 0.25,  dir: 'left' },
      { nx: -0.004, ny: 0.643, dir: 'left' },
      { nx: 0.257,  ny: 0.992, dir: 'down' }
    ]
  },
  { id: 'space1', file: 'space1.svg', w: 307, h: 327,
    root: { nx: 0.684, ny: 0.181 },
    sockets: [
      { nx: 0.619, ny: 0.172, dir: 'up'    },
      { nx: 0.866, ny: 0.337, dir: 'up'    },
      { nx: 0.629, ny: 0.031, dir: 'right' },
      { nx: 0.622, ny: 0.267, dir: 'right' }
    ]
  },
  { id: 'clahn', file: 'clahn.svg', w: 242, h: 525,
    root: { nx: 0.543, ny: 0 },
    sockets: [
      { nx: 0.998, ny: 0.341, dir: 'right' },
      { nx: 0.994, ny: 0.119, dir: 'right' },
      { nx: 0.957, ny: 0.713, dir: 'right' },
      { nx: 0.928, ny: 0.861, dir: 'right' },
      { nx: 0.899, ny: 0.964, dir: 'right' },
      { nx: 0.733, ny: 0.999, dir: 'down'  }
    ]
  },
  { id: 'pengu', file: 'pengu.svg', w: 88, h: 96,
    root: { nx: 0.631, ny: 0.987 },
    sockets: [
      { nx: 0.449, ny: 0.987, dir: 'down' },
      { nx: 0.858, ny: 0.997, dir: 'down' }
    ]
  }
];

const BASE_H  = 180;
const SCALE_V = 0.28;

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rnd(a, b) { return a + Math.random() * (b - a); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function absPoint(placed, reg, nx, ny) {
  return {
    x: placed.x + nx * reg.w * placed.s,
    y: placed.y + ny * reg.h * placed.s,
  };
}

const PUNCT_FNS = [
  t => t, t => t, t => t,
  t => t + '.', t => t + '—', t => '—' + t,
  t => t + '...', t => t + ',', t => '(' + t + ')',
];

function typeset(text) {
  return {
    text:   pick(PUNCT_FNS)(text),
    size:   pick([11,12,13,14,15,17,20,24]),
    weight: pick([300,300,300,400,400,700]),
    italic: Math.random() < 0.18,
    xOff:   Math.floor(rnd(0, 72)),
  };
}

// ─────────────────────────────────────────
// SESSION
// ─────────────────────────────────────────
let sessionPlaced = [];

function clearAssembly() {
  document.getElementById('canvas').querySelectorAll('.placed-img').forEach(e => e.remove());
  document.getElementById('svg-overlay').innerHTML = '';
  sessionPlaced = [];
}

function addOneComponent() {
  if (Math.random() > 0.55) return;

  const cw = window.innerWidth;
  const ch = window.innerHeight - 44;
  const canvas  = document.getElementById('canvas');
  const overlay = document.getElementById('svg-overlay');

  const usedIds = new Set(sessionPlaced.map(p => p.reg.id));
  const pool    = REGISTRY.filter(r => !usedIds.has(r.id));
  if (!pool.length) return;
  const reg = pick(pool);

  const s = (BASE_H / reg.h) * (1 + rnd(-SCALE_V, SCALE_V));
  let x, y;

  if (sessionPlaced.length === 0) {
    const tx = cw * rnd(0.62, 0.78);
    const ty = ch * rnd(0.22, 0.42);
    x = tx - reg.root.nx * reg.w * s;
    y = ty - reg.root.ny * reg.h * s;
  } else {
    const candidates = shuffle([...sessionPlaced]);
    let host = null, hostSockIdx = -1;
    outer: for (const h of candidates) {
      for (const idx of shuffle(h.reg.sockets.map((_, i) => i))) {
        if (!h.usedSockets.has(idx)) { host = h; hostSockIdx = idx; break outer; }
      }
    }

    if (!host) {
      const last = sessionPlaced[sessionPlaced.length - 1];
      x = last.x + rnd(-60, 60);
      y = last.y + rnd(30, 80);
    } else {
      const sock    = host.reg.sockets[hostSockIdx];
      const sockAbs = absPoint(host, host.reg, sock.nx, sock.ny);
      host.usedSockets.add(hostSockIdx);
      x = sockAbs.x - reg.root.nx * reg.w * s;
      y = sockAbs.y - reg.root.ny * reg.h * s;

      const newRootAbs = absPoint({ x, y, s }, reg, reg.root.nx, reg.root.ny);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', sockAbs.x.toFixed(1));
      line.setAttribute('y1', (sockAbs.y + 44).toFixed(1));
      line.setAttribute('x2', newRootAbs.x.toFixed(1));
      line.setAttribute('y2', (newRootAbs.y + 44).toFixed(1));
      line.setAttribute('stroke', '#111');
      line.setAttribute('stroke-width', '0.8');
      line.setAttribute('opacity', '0.22');
      overlay.appendChild(line);
    }
  }

  const entry = { reg, x, y, s, usedSockets: new Set() };
  sessionPlaced.push(entry);

  const img = document.createElement('img');
  img.className = 'placed-img';
  img.src = reg.file;
  img.style.width  = (reg.w * s).toFixed(1) + 'px';
  img.style.height = (reg.h * s).toFixed(1) + 'px';
  img.style.left   = x.toFixed(1) + 'px';
  img.style.top    = (y + 44).toFixed(1) + 'px';
  canvas.appendChild(img);
}

const HEADER_H = 44;
const COL_LEFT = 52;
const COL_TOP  = 28;
const ROW_H    = 44;

let nodes       = [];
let kbIdx       = 0;
let lockedCount = 0;

const col      = document.getElementById('col');
const canvas   = document.getElementById('canvas');
const resetBtn = document.getElementById('reset-btn');
const resetDot = document.getElementById('reset-dot');

function buildSession() {
  col.innerHTML = '';
  document.querySelectorAll('.locked-line').forEach(e => e.remove());
  lockedCount = 0;
  nodes = [];
  kbIdx = 0;
  updateResetCircle();
  clearAssembly();

  const count = 3 + Math.floor(Math.random() * 8);

  for (let i = 0; i < count; i++) {
    const node   = document.createElement('div');
    node.className = 'node';

    const circle = document.createElement('div');
    circle.className = 'node-circle';

    const label  = document.createElement('div');
    label.className = 'node-label';
    label.textContent = pick(ALL_LINES);

    node.appendChild(circle);
    node.appendChild(label);
    col.appendChild(node);

    const data = { el: node, labelEl: label, index: i, locked: false, cycleId: null };
    nodes.push(data);
    startCycle(data);

    node.addEventListener('click', () => lockNode(data));
    node.addEventListener('mouseenter', () => {
      nodes.forEach(n => n.el.classList.remove('kb-active'));
      kbIdx = data.index;
    });
  }

  updateKbFocus();
}

function startCycle(data) {
  const speed  = pick([70, 90, 110, 130, 160]);
  let   offset = Math.floor(Math.random() * ALL_LINES.length);
  data.cycleId = setInterval(() => {
    if (!data.locked) {
      data.labelEl.textContent = ALL_LINES[offset % ALL_LINES.length];
      offset++;
    }
  }, speed);
}

function lockNode(data) {
  if (data.locked) return;
  data.locked = true;
  clearInterval(data.cycleId);

  const ts = typeset(pick(ALL_LINES));
  data.el.style.visibility = 'hidden';

  const absY = HEADER_H + COL_TOP + data.index * ROW_H + ROW_H / 2;

  const line = document.createElement('div');
  line.className        = 'locked-line';
  line.textContent      = ts.text;
  line.style.fontSize   = ts.size + 'px';
  line.style.fontWeight = ts.weight;
  line.style.fontStyle  = ts.italic ? 'italic' : 'normal';
  line.style.left       = (COL_LEFT + ts.xOff) + 'px';
  line.style.top        = (absY - ts.size * 0.5) + 'px';
  canvas.appendChild(line);

  lockedCount++;
  addOneComponent();
  updateResetCircle();
  advanceKb();
}

function advanceKb() {
  let next = -1;
  for (let i = kbIdx + 1; i < nodes.length; i++) {
    if (!nodes[i].locked) { next = i; break; }
  }
  if (next === -1) {
    for (let i = 0; i < kbIdx; i++) {
      if (!nodes[i].locked) { next = i; break; }
    }
  }
  if (next >= 0) kbIdx = next;
  updateKbFocus();
}

function updateKbFocus() {
  nodes.forEach(n => n.el.classList.remove('kb-active'));
  if (kbIdx >= 0 && kbIdx < nodes.length && !nodes[kbIdx].locked)
    nodes[kbIdx].el.classList.add('kb-active');
}

function updateResetCircle() {
  const pct = nodes.length ? lockedCount / nodes.length : 0;
  resetBtn.classList.remove('full');
  if (pct <= 0) {
    resetDot.style.width = resetDot.style.height = '4px';
  } else if (pct >= 1) {
    resetDot.style.width = resetDot.style.height = '70px';
    resetBtn.classList.add('full');
  } else {
    const sz = 4 + pct * 66;
    resetDot.style.width = resetDot.style.height = sz + 'px';
  }
}

resetBtn.addEventListener('click', buildSession);

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (kbIdx >= 0 && kbIdx < nodes.length) lockNode(nodes[kbIdx]);
  }
});

buildSession();
</script>
</body>
